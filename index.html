<!DOCTYPE html>
<html lang="pt-br">
<head>
    <style>
        /* Estilos simples */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .card img { width: 100%; cursor: pointer; transition: 0.3s; }
        
        /* Modal de Preview */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        #modal img { max-width: 90%; max-height: 80%; }
    </style>
</head>
<body>

    <div id="filtros">
        <button onclick="filtrar('all')">Todas</button>
        <button onclick="filtrar('normal')">Normal</button>
        <button onclick="filtrar('phantom_thieves')">Phantom Thieves</button>
    </div>

    <div id="galeria" class="grid"></div>

    <div id="modal" onclick="this.style.display='none'">
        <img id="img-preview" src="">
    </div>

    <script>
        let dadosGlobais = [];

        fetch('fotos.json').then(r => r.json()).then(lista => {
            dadosGlobais = lista;
            renderizar(lista);
        });

        function renderizar(lista) {
            const container = document.getElementById('galeria');
            container.innerHTML = '';
            lista.forEach(item => {
                const img = document.createElement('img');
                img.src = `futaba/${item.caminho}`;
                img.onclick = () => {
                    document.getElementById('img-preview').src = img.src;
                    document.getElementById('modal').style.display = 'flex';
                };
                container.appendChild(img);
            });
        }

        function filtrar(cat) {
            if(cat === 'all') renderizar(dadosGlobais);
            else renderizar(dadosGlobais.filter(i => i.categoria === cat));
        }
    </script>
</body>
</html>
