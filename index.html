<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>Futaba Gallery</title>
    
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; margin: 0; }
        
        /* Título Principal */
        h1 { text-align: center; color: #ff9800; margin-top: 30px; font-size: 3em; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Filtros */
        #filtros { padding: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        button { padding: 10px 20px; cursor: pointer; background: #333; color: white; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #ff9800; color: black; }
        
        /* Galeria */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .card { width: 100%; height: 200px; overflow: hidden; border-radius: 8px; background: #222; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card img, .card video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; transition: 0.3s; }
        .card img:hover, .card video:hover { transform: scale(1.08); }
        
        /* Modal de Preview (Lightbox) */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 1000; }
        #modal-content { max-width: 90%; max-height: 90%; display: flex; justify-content: center; align-items: center; }
        #modal-content img, #modal-content video { max-width: 100%; max-height: 90vh; border-radius: 6px; box-shadow: 0 0 20px rgba(255,152,0,0.5); }
    </style>
</head>
<body>

    <h1>FutabaGallery</h1>

    <div id="filtros">
        <button onclick="filtrar('all')">All</button>
        <button onclick="filtrar('normal')">Normal</button>
        <button onclick="filtrar('oracle')">Oracles</button>
        <button onclick="filtrar('misc')">Misc</button>
        <button onclick="filtrar('ren_futaba')">Ren + Futaba</button>
    </div>

    <div id="galeria" class="grid"></div>

    <div id="modal" onclick="fecharModal()">
        <div id="modal-content" onclick="event.stopPropagation()">
            </div>
    </div>

    <script>
        // Definições de caminhos usando o CDN jsDelivr
        const USERNAME = "or4acle";
        const MEDIA_REPO = "futaba-media";
        
        const JSON_URL = `https://cdn.jsdelivr.net/gh/${USERNAME}/${MEDIA_REPO}@main/fotos.json`;
        const MEDIA_BASE_URL = `https://cdn.jsdelivr.net/gh/${USERNAME}/${MEDIA_REPO}@main/`;

        let dadosGlobais = [];

        // Procura o ficheiro JSON no repositório de mídia
        fetch(JSON_URL)
            .then(response => {
                if (!response.ok) throw new Error("Não foi possível aceder ao fotos.json de mídia.");
                return response.json();
            })
            .then(lista => {
                dadosGlobais = lista;
                renderizar(dadosGlobais);
            })
            .catch(err => {
                console.error("Erro ao carregar a galeria:", err);
                document.getElementById('galeria').innerHTML = `<p style="text-align:center; color: #ff9800;">Erro ao carregar a galeria. Certifica-te de que o repositório 'futaba-media' é público.</p>`;
            });

        function renderizar(lista) {
            const container = document.getElementById('galeria');
            container.innerHTML = '';

            lista.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';

                const urlMidia = `${MEDIA_BASE_URL}${item.caminho}`;
                const isVideo = item.nome.endswith && item.nome.endsWith('.webm') || item.caminho.endsWith('.webm');

                let elemento;
                if (isVideo) {
                    elemento = document.createElement('video');
                    elemento.src = urlMidia;
                    elemento.muted = true;
                    elemento.loop = true;
                    elemento.onmouseover = () => elemento.play();
                    elemento.onmouseout = () => elemento.pause();
                } else {
                    elemento = document.createElement('img');
                    elemento.src = urlMidia;
                    elemento.loading = "lazy"; // Melhora drasticamente a performance de carregamento
                }

                elemento.onclick = () => abrirModal(urlMidia, isVideo);

                div.appendChild(elemento);
                container.appendChild(div);
            });
        }

        function filtrar(cat) {
            if (cat === 'all') {
                renderizar(dadosGlobais);
            } else {
                renderizar(dadosGlobais.filter(i => i.categoria === cat));
            }
        }

        function abrirModal(url, isVideo) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');

            if (isVideo) {
                content.innerHTML = `<video src="${url}" controls autoplay loop></video>`;
            } else {
                content.innerHTML = `<img src="${url}" alt="Preview">`;
            }
            modal.style.display = 'flex';
        }

        function fecharModal() {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = ''; // Limpa o conteúdo para parar a reprodução de áudio/vídeo
            modal.style.display = 'none';
        }
    </script>
</body>
</html>
