<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="apple-touch-icon" sizes="57x57" href="/apple-icon-57x57.png">
<link rel="apple-touch-icon" sizes="60x60" href="/apple-icon-60x60.png">
<link rel="apple-touch-icon" sizes="72x72" href="/apple-icon-72x72.png">
<link rel="apple-touch-icon" sizes="76x76" href="/apple-icon-76x76.png">
<link rel="apple-touch-icon" sizes="114x114" href="/apple-icon-114x114.png">
<link rel="apple-touch-icon" sizes="120x120" href="/apple-icon-120x120.png">
<link rel="apple-touch-icon" sizes="144x144" href="/apple-icon-144x144.png">
<link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png">
<link rel="icon" type="image/png" sizes="192x192"  href="/android-icon-192x192.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/manifest.json">
<meta name="msapplication-TileColor" content="#ffffff">
<meta name="msapplication-TileImage" content="/ms-icon-144x144.png">
<meta name="theme-color" content="#ffffff">
    <meta charset="UTF-8">
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; }
        #filtros { padding: 20px; display: flex; gap: 10px; justify-content: center; }
        button { padding: 10px 20px; cursor: pointer; background: #333; color: white; border: none; border-radius: 5px; }
        button:hover { background: #555; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .card { width: 100%; height: 200px; overflow: hidden; border-radius: 8px; }
        .card img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; transition: 0.3s; }
        .card img:hover { transform: scale(1.1); }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 1000; }
        #modal img { max-width: 90%; max-height: 90%; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="filtros">
        <button onclick="filtrar('all')">All</button>
        <button onclick="filtrar('normal')">Normal</button>
        <button onclick="filtrar('oracle')">Oracle</button>
        <button onclick="filtrar('misc')">Misc</button>
        <button onclick="filtrar('ren_futaba')">Ren + Futaba</button>
    </div>

    <div id="galeria" class="grid"></div>

    <div id="modal" onclick="this.style.display='none'">
        <img id="img-preview" src="">
    </div>

    <script>
        let dadosGlobais = [];

        fetch('fotos.json')
            .then(r => r.json())
            .then(lista => {
                dadosGlobais = lista;
                renderizar(dadosGlobais);
            })
            .catch(err => console.error("Erro ao carregar JSON:", err));

        function renderizar(lista) {
            const container = document.getElementById('galeria');
            container.innerHTML = '';
            lista.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                const img = document.createElement('img');
                img.src = `futaba/${item.caminho}`;
                img.onclick = () => {
                    document.getElementById('img-preview').src = img.src;
                    document.getElementById('modal').style.display = 'flex';
                };
                div.appendChild(img);
                container.appendChild(div);
            });
        }

        function filtrar(cat) {
            if(cat === 'all') renderizar(dadosGlobais);
            else renderizar(dadosGlobais.filter(i => i.categoria === cat));
        }
    </script>
</body>
</html>
