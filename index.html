<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <title>FutabaGallery</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f0f1a;
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
        }

        /* === HEADER === */
        header {
            text-align: center;
            padding: 40px 20px 10px;
            position: relative;
        }

        header::after {
            content: '';
            display: block;
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #e23636, #ff9800, transparent);
            margin: 15px auto 0;
        }

        h1 {
            font-size: 3em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #e23636, #ff9800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.95em;
            color: #666;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* === BARRA DE PESQUISA === */
        #search-container {
            display: flex;
            justify-content: center;
            padding: 20px 20px 0;
        }

        #search {
            background: #1a1a2e;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1em;
            font-family: 'Rajdhani', sans-serif;
            width: 100%;
            max-width: 400px;
            outline: none;
            transition: border-color 0.3s;
        }

        #search:focus { border-color: #e23636; }
        #search::placeholder { color: #555; }

        /* === FILTROS === */
        #filtros {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }

        .filter-btn {
            padding: 8px 20px;
            cursor: pointer;
            background: #1a1a2e;
            color: #888;
            border: 1px solid #2a2a3e;
            border-radius: 20px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.25s;
        }

        .filter-btn:hover { border-color: #e23636; color: #e0e0e0; }

        .filter-btn.active {
            background: linear-gradient(135deg, #e23636, #ff6600);
            color: #fff;
            border-color: transparent;
        }

        /* === CONTADOR === */
        #counter {
            text-align: center;
            color: #555;
            font-size: 0.85em;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding-bottom: 10px;
        }

        /* === LOADING === */
        #loading {
            text-align: center;
            padding: 60px 20px;
            color: #555;
            font-size: 1.1em;
            letter-spacing: 2px;
        }

        #loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1a1a2e;
            border-top-color: #e23636;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* === GALERIA === */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            padding: 10px 20px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 10px;
            background: #16162a;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(226, 54, 54, 0.15);
        }

        .card img, .card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .card:hover img, .card:hover video { transform: scale(1.06); }

        .card .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            font-size: 0.75em;
            color: #ccc;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card:hover .overlay { opacity: 1; }

        /* === MODAL === */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        #modal-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #modal-content img, #modal-content video {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(226, 54, 54, 0.2);
        }

        #modal-close {
            position: fixed;
            top: 20px;
            right: 25px;
            font-size: 2em;
            color: #666;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 1001;
            background: none;
            border: none;
            font-family: 'Rajdhani', sans-serif;
        }

        #modal-close:hover { color: #e23636; }

        /* === FOOTER === */
        footer {
            text-align: center;
            padding: 30px 20px;
            color: #333;
            font-size: 0.8em;
            letter-spacing: 1px;
        }

        footer a { color: #555; text-decoration: none; }
        footer a:hover { color: #e23636; }

        /* === RESPONSIVO === */
        @media (max-width: 600px) {
            h1 { font-size: 2em; letter-spacing: 3px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; padding: 10px 12px 30px; }
            .filter-btn { padding: 6px 14px; font-size: 0.8em; }
        }
    </style>
</head>
<body>

    <header>
        <h1>FutabaGallery</h1>
        <p class="subtitle">Fan Art Collection</p>
    </header>

    <div id="search-container">
        <input type="text" id="search" placeholder="Pesquisar..." autocomplete="off">
    </div>

    <div id="filtros">
        <button class="filter-btn active" data-cat="all">Todas</button>
        <button class="filter-btn" data-cat="normal">Normal</button>
        <button class="filter-btn" data-cat="oracle">Oracles</button>
        <button class="filter-btn" data-cat="misc">Misc</button>
        <button class="filter-btn" data-cat="ren_futaba">Ren + Futaba</button>
    </div>

    <div id="counter"></div>

    <div id="loading">
        <div class="spinner"></div>
        A carregar galeria...
    </div>

    <div id="galeria" class="grid"></div>

    <div id="modal" onclick="fecharModal()">
        <button id="modal-close" onclick="fecharModal()">&times;</button>
        <div id="modal-content" onclick="event.stopPropagation()"></div>
    </div>

    <footer>
        imagens de <a href="https://discord.gg/e6BZNXqJrk" target="_blank">Church of Futaba</a>
    </footer>

    <script>
        const USERNAME = "or4acle";
        const MEDIA_REPO = "futaba-media";
        const JSON_URL = `https://cdn.jsdelivr.net/gh/${USERNAME}/${MEDIA_REPO}@main/fotos.json`;
        const MEDIA_BASE_URL = `https://cdn.jsdelivr.net/gh/${USERNAME}/${MEDIA_REPO}@main/`;

        let dadosGlobais = [];
        let categoriaAtual = 'all';

        fetch(JSON_URL)
            .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(lista => {
                dadosGlobais = lista;
                document.getElementById('loading').style.display = 'none';
                renderizar(dadosGlobais);
            })
            .catch(() => {
                document.getElementById('loading').innerHTML =
                    '<p style="color:#e23636;">Erro ao carregar a galeria.<br>Certifica-te de que o repositório \'futaba-media\' é público.</p>';
            });

        function renderizar(lista) {
            const container = document.getElementById('galeria');
            container.innerHTML = '';
            document.getElementById('counter').textContent = `${lista.length} imagens`;

            lista.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';

                const url = `${MEDIA_BASE_URL}${item.caminho}`;
                const isVideo = item.caminho.endsWith('.webm');

                let el;
                if (isVideo) {
                    el = document.createElement('video');
                    el.src = url;
                    el.muted = true;
                    el.loop = true;
                    el.preload = 'metadata';
                    el.onmouseenter = () => el.play();
                    el.onmouseleave = () => { el.pause(); el.currentTime = 0; };
                } else {
                    el = document.createElement('img');
                    el.src = url;
                    el.loading = 'lazy';
                    el.alt = item.nome;
                }

                el.onclick = () => abrirModal(url, isVideo);

                const overlay = document.createElement('div');
                overlay.className = 'overlay';
                overlay.textContent = item.nome;

                div.appendChild(el);
                div.appendChild(overlay);
                container.appendChild(div);
            });
        }

        function filtrar(cat) {
            categoriaAtual = cat;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.cat === cat);
            });
            aplicarFiltros();
        }

        function aplicarFiltros() {
            const query = document.getElementById('search').value.toLowerCase().trim();
            let lista = dadosGlobais;

            if (categoriaAtual !== 'all') {
                lista = lista.filter(i => i.categoria === categoriaAtual);
            }

            if (query) {
                lista = lista.filter(i => i.nome.toLowerCase().includes(query));
            }

            renderizar(lista);
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => filtrar(btn.dataset.cat));
        });

        document.getElementById('search').addEventListener('input', aplicarFiltros);

        function abrirModal(url, isVideo) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = isVideo
                ? `<video src="${url}" controls autoplay loop></video>`
                : `<img src="${url}" alt="Preview">`;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function fecharModal() {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = '';
            modal.style.display = 'none';
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') fecharModal();
        });
    </script>
</body>
</html>
